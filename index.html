<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeatherNow</title>

    <!-- Core layout and theme stylesheet -->
    <link rel="stylesheet" href="css/style.css" />

    <!-- Icon font library used for weather and UI icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>

    <!-- Persistent top bar with branding and theme switching control -->
    <header class="header">
      <div class="logo">
        <i class="fa-solid fa-cloud-sun"></i>
        <span>WeatherNow</span>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle light and dark mode">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
      </button>
    </header>

    <main class="container">

      <section class="search-section">
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
          <input
            type="text"
            id="cityInput"
            class="search-input"
            placeholder="Search city e.g. Lagos, London..."
            autocomplete="off"
          />
          <button class="search-btn" id="searchBtn">Search</button>
        </div>
        <p class="error-msg hidden" id="errorMsg">
          <i class="fa-solid fa-triangle-exclamation"></i>
          City not found. Please try again.
        </p>
      </section>

      <div class="loader hidden" id="loader">
        <div class="spinner"></div>
        <p>Fetching weather data...</p>
      </div>

      <div class="weather-content hidden" id="weatherContent">

        <section class="current-weather card">
          <div class="current-top">
            <div class="location-info">
              <h2 class="city-name" id="cityName">--</h2>
              <p class="country" id="countryName">--</p>
              <p class="date" id="currentDate">--</p>
            </div>
            <div class="weather-icon-wrap">
              <img src="" alt="Weather icon" id="weatherIcon" class="weather-icon" />
              <p class="weather-desc" id="weatherDesc">--</p>
            </div>
          </div>

          <div class="temp-display">
            <span class="temperature" id="temperature">--</span>
            <div class="temp-unit-toggle">
              <button class="unit-btn active" id="celsiusBtn">°C</button>
              <span>|</span>
              <button class="unit-btn" id="fahrenheitBtn">°F</button>
            </div>
          </div>

          <!-- Weather metrics shown in cards for humidity, wind, feels like, and visibility -->
          <div class="stats-row">
            <div class="stat-card">
              <i class="fa-solid fa-droplet"></i>
              <div>
                <p class="stat-label">Humidity</p>
                <p class="stat-value" id="humidity">--%</p>
              </div>
            </div>
            <div class="stat-card">
              <i class="fa-solid fa-wind"></i>
              <div>
                <p class="stat-label">Wind Speed</p>
                <p class="stat-value" id="windSpeed">-- km/h</p>
              </div>
            </div>
            <div class="stat-card">
              <i class="fa-solid fa-temperature-half"></i>
              <div>
                <p class="stat-label">Feels Like</p>
                <p class="stat-value" id="feelsLike">--</p>
              </div>
            </div>
            <div class="stat-card">
              <i class="fa-solid fa-eye"></i>
              <div>
                <p class="stat-label">Visibility</p>
                <p class="stat-value" id="visibility">-- km</p>
              </div>
            </div>
          </div>
        </section>

        <section class="forecast-section">
          <h3 class="section-title">
            <i class="fa-solid fa-calendar-days"></i> 5-Day Forecast
          </h3>
          <div class="forecast-grid" id="forecastGrid">
          </div>
        </section>

      </div>

      <div class="empty-state" id="emptyState">
        <i class="fa-solid fa-earth-africa"></i>
        <p>Enter a city name to get started</p>
      </div>

    </main>

    <!-- Simple attribution footer with external API source reference -->
    <footer class="footer">
      <p>Powered by <a href="https://openweathermap.org" target="_blank" rel="noopener noreferrer">OpenWeatherMap</a></p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
